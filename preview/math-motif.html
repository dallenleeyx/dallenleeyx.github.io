<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Math Motif</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--bg);font-family:var(--font-sans);height:100%;overflow:hidden;}
canvas{position:absolute;inset:0;opacity:.55;}
.deco{font-family:var(--font-mono);font-size:.68rem;color:var(--border);position:absolute;bottom:18px;left:14px;writing-mode:vertical-rl;letter-spacing:.12em;}
.lab{position:absolute;top:18px;left:18px;font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);letter-spacing:.05em;}
.lab2{position:absolute;top:18px;right:18px;font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);}</style>
</head><body>
  <canvas id="c"></canvas>
  <div class="lab">∂ math-glyph particle field</div>
  <div class="lab2">∇²S(θ)</div>
  <div class="deco">∂²f / ∂xᵢ∂xⱼ · · · ∇²S(θ)</div>
  <script>
    const c=document.getElementById('c'),x=c.getContext('2d');
    const SY=['∂','∇','∑','ℝ','ℂ','∞','π','∫','√','θ','λ','μ','σ','⊕','∈'];
    let W,H,P=[];
    function rs(){W=c.width=c.clientWidth=window.innerWidth;H=c.height=c.clientHeight=window.innerHeight;}
    function mk(){return{x:Math.random()*W,y:Math.random()*H,s:SY[(Math.random()*SY.length)|0],sz:9+Math.random()*10,vx:(Math.random()-.5)*.15,vy:-.12-Math.random()*.18,l:Math.random()};}
    function loop(){x.clearRect(0,0,W,H);P.forEach(p=>{p.l+=.002;p.x+=p.vx;p.y+=p.vy;if(p.y<-30)Object.assign(p,mk(),{y:H+10});x.save();x.font=`${p.sz}px DM Mono,monospace`;x.fillStyle=`rgba(200,200,200,${.04+.09*Math.sin(p.l*Math.PI)})`;x.fillText(p.s,p.x,p.y);x.restore();});requestAnimationFrame(loop);}
    rs();P=Array.from({length:28},mk);loop();window.addEventListener('resize',rs);
  </script>
</body></html>
