<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn{font-family:var(--font-sans);font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.58rem 1.3rem;border-radius:8px;border:none;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-primary{background:var(--accent);color:var(--bg);}
.btn-outline{background:transparent;color:var(--fg-2);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.tag{font-size:.68rem;font-weight:600;padding:.2rem .6rem;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;color:var(--fg-2);}
.pill{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .58rem;border-radius:20px;border:1px solid var(--border);background:var(--surface-2);color:var(--fg-2);}
</style></head>
<body>
  <a class="btn btn-primary">View Research</a>
  <a class="btn btn-outline">Get in Touch</a>
  <span class="tag">Python</span>
  <span class="tag">Math</span>
  <span class="pill">Completed</span>
  <span class="pill" style="color:var(--fg-muted);">Upcoming</span>
</body></html>
