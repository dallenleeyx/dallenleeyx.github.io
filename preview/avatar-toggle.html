<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Avatar & Theme Toggle</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);display:flex;align-items:center;gap:36px;}
.av{width:80px;height:80px;position:relative;flex-shrink:0;}
.ai{position:absolute;inset:4px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:1.35rem;font-weight:500;color:var(--accent);}
.ar{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,var(--accent),var(--accent-2),var(--accent-3),var(--accent)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;border:2px solid transparent;animation:spin 6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tg{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:.28rem .4rem;display:flex;gap:.15rem;box-shadow:0 2px 10px rgba(0,0,0,.15);}
.ti{width:30px;height:30px;border-radius:50px;display:flex;align-items:center;justify-content:center;font-size:.9rem;opacity:.35;}
.ti.on{opacity:1;background:var(--accent);}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:8px;letter-spacing:.04em;}
.col{display:flex;flex-direction:column;align-items:center;}</style>
</head><body>
  <div class="col"><div class="av"><div class="ar"></div><div class="ai">DL</div></div><div class="lab">avatar · animated ring</div></div>
  <div class="col"><div class="tg"><div class="ti">☀️</div><div class="ti on">🌙</div></div><div class="lab">theme toggle</div></div>
  <div class="col"><div class="tg"><div class="ti on">☀️</div><div class="ti">🌙</div></div><div class="lab">theme toggle (light)</div></div>
</body></html>
