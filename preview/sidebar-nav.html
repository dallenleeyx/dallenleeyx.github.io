<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Sidebar Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:18px;font-family:var(--font-sans);}
.nav{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 12px;width:240px;}
.nav a{display:flex;align-items:center;gap:.55rem;padding:.42rem .65rem;font-size:.76rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-muted);text-decoration:none;border-radius:8px;}
.nav a.on{color:var(--accent);background:var(--surface-2);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);}
.nav a.on .dot{background:var(--accent);transform:scale(1.5);}
.nav a:hover{color:var(--fg-1);background:var(--surface-2);}</style>
</head><body>
  <div class="nav">
    <a class="on"><span class="dot"></span>About</a>
    <a><span class="dot"></span>Research</a>
    <a><span class="dot"></span>Personal Projects</a>
    <a><span class="dot"></span>Courses</a>
    <a><span class="dot"></span>Blog</a>
  </div>
</body></html>
