<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Course Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;max-width:600px;}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;}
.code{font-family:var(--font-mono);font-size:.72rem;font-weight:500;color:var(--accent);margin-bottom:.25rem;letter-spacing:.04em;}
.nm{font-size:.8rem;font-weight:600;color:var(--fg-1);line-height:1.4;}
.dp{font-size:.65rem;color:var(--fg-muted);margin-top:.2rem;text-transform:uppercase;letter-spacing:.06em;}</style>
</head><body>
  <div class="grid">
    <div class="cc"><div class="code">MA4271</div><div class="nm">Differential Geometry of Curves and Surfaces</div><div class="dp">Mathematics</div></div>
    <div class="cc"><div class="code">MA2116</div><div class="nm">Probability</div><div class="dp">Mathematics</div></div>
    <div class="cc"><div class="code">ST2132</div><div class="nm">Mathematical Statistics</div><div class="dp">Statistics</div></div>
  </div>
</body></html>
