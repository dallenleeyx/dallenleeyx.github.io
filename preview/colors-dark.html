<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Colors — Dark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg);color:var(--fg-1);font-family:var(--font-sans);padding:18px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{width:120px;}
  .chip{height:54px;border-radius:8px;border:1px solid var(--border);}
  .name{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);margin-top:6px;letter-spacing:.04em;}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0c0c0c;"></div><div class="name">--bg</div><div class="val">#0c0c0c</div></div>
    <div class="sw"><div class="chip" style="background:#141414;"></div><div class="name">--surface</div><div class="val">#141414</div></div>
    <div class="sw"><div class="chip" style="background:#1c1c1c;"></div><div class="name">--surface-2</div><div class="val">#1c1c1c</div></div>
    <div class="sw"><div class="chip" style="background:#2a2a2a;"></div><div class="name">--border</div><div class="val">#2a2a2a</div></div>
    <div class="sw"><div class="chip" style="background:#555;"></div><div class="name">--fg-muted</div><div class="val">#555</div></div>
    <div class="sw"><div class="chip" style="background:#a0a0a0;"></div><div class="name">--fg-2</div><div class="val">#a0a0a0</div></div>
    <div class="sw"><div class="chip" style="background:#c0c0c0;"></div><div class="name">--accent-2</div><div class="val">#c0c0c0</div></div>
    <div class="sw"><div class="chip" style="background:#e0e0e0;"></div><div class="name">--accent-3</div><div class="val">#e0e0e0</div></div>
    <div class="sw"><div class="chip" style="background:#f0f0f0;"></div><div class="name">--fg-1</div><div class="val">#f0f0f0</div></div>
    <div class="sw"><div class="chip" style="background:#fff;"></div><div class="name">--accent</div><div class="val">#ffffff</div></div>
  </div>
</body></html>
