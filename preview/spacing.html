<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);color:var(--fg-2);}
.row{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
.bar{background:var(--accent);height:10px;}
.tk{font-family:var(--font-mono);font-size:10px;color:var(--accent);min-width:90px;}
.px{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);min-width:46px;}</style>
</head><body>
  <div class="row"><span class="tk">--space-1</span><span class="px">4 px</span><span class="bar" style="width:4px;"></span></div>
  <div class="row"><span class="tk">--space-2</span><span class="px">8 px</span><span class="bar" style="width:8px;"></span></div>
  <div class="row"><span class="tk">--space-3</span><span class="px">12 px</span><span class="bar" style="width:12px;"></span></div>
  <div class="row"><span class="tk">--space-4</span><span class="px">16 px</span><span class="bar" style="width:16px;"></span></div>
  <div class="row"><span class="tk">--space-5</span><span class="px">24 px</span><span class="bar" style="width:24px;"></span></div>
  <div class="row"><span class="tk">--space-6</span><span class="px">32 px</span><span class="bar" style="width:32px;"></span></div>
  <div class="row"><span class="tk">--space-8</span><span class="px">48 px</span><span class="bar" style="width:48px;"></span></div>
  <div class="row"><span class="tk">--space-10</span><span class="px">80 px</span><span class="bar" style="width:80px;"></span></div>
</body></html>
