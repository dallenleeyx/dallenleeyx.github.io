<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);color:var(--fg-1);padding:18px;font-family:var(--font-sans);}
table{border-collapse:collapse;width:100%;}
td{padding:5px 12px 5px 0;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
td.tok{color:var(--accent);min-width:90px;}
td.spec{color:var(--fg-muted);min-width:120px;}
td.eg{font-family:var(--font-sans);color:var(--fg-1);}</style>
</head><body>
<table>
  <tr><td class="tok">--fs-6xl</td><td class="spec">2.80rem · 700</td><td class="eg" style="font-size:1.6rem;font-weight:700;letter-spacing:-.03em;">Display</td></tr>
  <tr><td class="tok">--fs-5xl</td><td class="spec">2.10rem · 700</td><td class="eg" style="font-size:1.35rem;font-weight:700;letter-spacing:-.025em;">Post Title</td></tr>
  <tr><td class="tok">--fs-3xl</td><td class="spec">1.25rem · 700</td><td class="eg" style="font-size:1.05rem;font-weight:700;">Section H2</td></tr>
  <tr><td class="tok">--fs-xl</td><td class="spec">0.96rem · 400</td><td class="eg" style="font-size:.92rem;color:var(--fg-2);">Body prose copy</td></tr>
  <tr><td class="tok">--fs-md</td><td class="spec">0.78rem · 700</td><td class="eg" style="font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;">Button</td></tr>
  <tr><td class="tok">--fs-sm</td><td class="spec">0.68rem · 800</td><td class="eg" style="font-size:.68rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);">Section Label</td></tr>
</table>
</body></html>
