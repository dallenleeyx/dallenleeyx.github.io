<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);color:var(--fg-2);}
.row{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;align-items:center;color:var(--fg-2);}
.ic{width:32px;height:32px;color:var(--fg-2);}
.lab{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-muted);margin-top:6px;letter-spacing:.04em;}
.note{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:14px;line-height:1.6;max-width:600px;}</style>
</head><body>
  <div class="row">
    <div class="col"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg><div class="lab">mail</div></div>
    <div class="col"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><div class="lab">home</div></div>
    <div class="col"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><div class="lab">search</div></div>
    <div class="col"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg><div class="lab">chevron-left</div></div>
    <div class="col" style="font-size:24px;">☀️<div class="lab">sun (toggle)</div></div>
    <div class="col" style="font-size:24px;">🌙<div class="lab">moon (toggle)</div></div>
    <div class="col" style="font-size:24px;">🔧<div class="lab">empty: projects</div></div>
    <div class="col" style="font-size:24px;">✍️<div class="lab">empty: blog</div></div>
  </div>
  <div class="note">Hand-rolled SVGs, 2 px stroke, currentColor. Emoji confined to the theme toggle and empty-state placeholders. No icon font.</div>
</body></html>
