<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Interest Chip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);}

.chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;}
.nm{font-size:.85rem;font-weight:700;color:var(--fg-1);margin-bottom:.2rem;}
.sub{font-size:.7rem;color:var(--fg-muted);}</style>
</head><body>
  <div class="grid">
    <div class="chip"><div class="nm">High-Geometry Statistics</div><div class="sub">Information Geometry</div></div>
    <div class="chip"><div class="nm">Quantitative Finance</div><div class="sub">Application of Machine Learning to QF</div></div>
  </div>
</body></html>
