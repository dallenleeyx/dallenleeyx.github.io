<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Blog Post Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);}
.post{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.4rem 1.7rem;max-width:600px;}
.meta{display:flex;align-items:center;gap:.8rem;margin-bottom:.5rem;}
.date{font-family:var(--font-mono);font-size:.68rem;color:var(--fg-muted);letter-spacing:.05em;}
.tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.15rem .5rem;border-radius:20px;background:var(--surface-2);color:var(--accent-2);border:1px solid var(--border);}
.tit{font-size:1rem;font-weight:700;color:var(--fg-1);margin-bottom:.4rem;}
.ex{font-size:.86rem;color:var(--fg-2);line-height:1.6;}</style>
</head><body>
  <div class="post">
    <div class="meta"><span class="date">Apr 2025</span><span class="tag">Information Geometry</span></div>
    <div class="tit">The Fisher–Rao Metric: When Probability Spaces Become Curved</div>
    <div class="ex">A statistical model is more than just a family of distributions — it carries a natural Riemannian geometry.</div>
  </div>
</body></html>
