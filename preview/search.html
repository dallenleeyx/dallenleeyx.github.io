<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Search Input</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);}
.wrap{position:relative;max-width:560px;margin-bottom:12px;}
.icon{position:absolute;top:50%;left:.9rem;transform:translateY(-50%);color:var(--fg-muted);display:flex;}
.inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem .7rem 2.4rem;font-family:var(--font-sans);font-size:.88rem;color:var(--fg-1);outline:none;}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.pills{display:flex;gap:.4rem;flex-wrap:wrap;}
.pill{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.22rem .65rem;border-radius:20px;border:1px solid var(--border);background:var(--surface-2);color:var(--fg-muted);cursor:pointer;}
.pill.active{border-color:var(--accent);background:var(--glow);color:var(--accent);}</style>
</head><body>
  <div class="wrap"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><input class="inp" placeholder="Search by code or name…" value=""/></div>
  <div class="pills"><span class="pill active">All</span><span class="pill">Mathematics</span><span class="pill">Statistics</span><span class="pill">CS</span></div>
</body></html>
