<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Section Label</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);}
.section-label{font-size:.68rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);padding-bottom:.65rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;margin-bottom:14px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.eyebrow{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.15rem .5rem;border-radius:20px;background:var(--surface-2);color:var(--accent-2);border:1px solid var(--border);}
.row{display:flex;gap:8px;align-items:center;}
.date{font-family:var(--font-mono);font-size:.68rem;color:var(--fg-muted);letter-spacing:.05em;}</style>
</head><body>
  <div class="section-label">Research</div>
  <div class="row"><span class="date">Apr 2025</span><span class="eyebrow">Information Geometry</span></div>
</body></html>
