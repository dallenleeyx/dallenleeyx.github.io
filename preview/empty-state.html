<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Empty State</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);}
.empty{text-align:center;padding:2.4rem 2rem;border:1px dashed var(--border);border-radius:14px;color:var(--fg-muted);max-width:520px;}
.icon{font-size:1.8rem;margin-bottom:.55rem;}
.tit{font-weight:700;color:var(--fg-2);margin-bottom:.2rem;font-size:.95rem;}
.sub{font-size:.82rem;}
.sub code{font-family:var(--font-mono);background:var(--surface-2);padding:.1rem .4rem;border-radius:4px;font-size:.78rem;color:var(--accent-2);}</style>
</head><body>
  <div class="empty"><div class="icon">🔧</div><div class="tit">Projects coming soon</div><div class="sub">Personal projects will appear here. Add them in <code>data.js</code>.</div></div>
</body></html>
