<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Logo / Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);display:flex;align-items:center;gap:40px;color:var(--fg-1);}
.wm{font-family:var(--font-mono);font-size:34px;font-weight:500;letter-spacing:-.02em;color:var(--accent);}
.wm-stack{display:flex;flex-direction:column;}
.name{font-family:var(--font-sans);font-size:13px;font-weight:700;letter-spacing:.18em;color:var(--accent);}
.sub{font-family:var(--font-mono);font-size:9px;color:var(--fg-muted);letter-spacing:.05em;margin-top:3px;}
.col{display:flex;flex-direction:column;align-items:flex-start;}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:10px;letter-spacing:.04em;}</style>
</head><body>
  <div class="col">
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="wm">DL</span>
      <div class="wm-stack"><span class="name">DALLEN LEE</span><span class="sub">∂ MATHEMATICS · NUS</span></div>
    </div>
    <div class="lab">primary wordmark</div>
  </div>
  <div class="col">
    <span class="wm" style="font-size:48px;">DL</span>
    <div class="lab">monogram</div>
  </div>
</body></html>
