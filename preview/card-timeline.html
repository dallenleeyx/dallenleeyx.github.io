<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<title>Card · Card Recipe</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg);padding:22px;font-family:var(--font-sans);}
.tl{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.4rem;max-width:560px;position:relative;overflow:hidden;}
.tl::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--accent);opacity:.6;border-radius:14px 0 0 14px;}
.meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;}
.date{font-family:var(--font-mono);font-size:.68rem;color:var(--fg-muted);letter-spacing:.05em;}
.badge{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .58rem;border-radius:20px;border:1px solid var(--border);background:var(--surface-2);color:var(--fg-2);}
.tit{font-size:.97rem;font-weight:700;color:var(--fg-1);margin:0 0 .2rem;}
.area{font-size:.7rem;color:var(--accent-2);font-weight:500;letter-spacing:.04em;margin:0 0 .55rem;}
ul{list-style:none;margin:0;padding:0;}
li{font-size:.84rem;color:var(--fg-2);line-height:1.55;padding-left:1rem;position:relative;}
li::before{content:'—';position:absolute;left:0;color:var(--fg-muted);font-size:.7rem;top:.18rem;}</style>
</head><body>
  <div class="tl">
    <div class="meta"><span class="date">Jan 2026 – May 2026</span><span class="badge">Completed</span></div>
    <p class="tit">Quantifier Elimination on abelian cyclic groups</p>
    <p class="area">Mathematical Logic · Model Theory · Algebra</p>
    <ul><li>Original undergraduate research result</li><li>Studied Model Theory independently</li></ul>
  </div>
</body></html>
